services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: thoth
      MYSQL_USER: thoth
      MYSQL_PASSWORD: thoth
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pthoth"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis-seed:
    image: redis:7.4
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./docker/redis/seed.redis:/seed.redis:ro
    entrypoint: ["sh", "-c", "cat /seed.redis | redis-cli -h redis --pipe"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: thoth
      POSTGRES_USER: thoth
      POSTGRES_DB: thoth
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thoth"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      THOTH_DATASOURCES_FILE: /app/config/datasources.docker.yaml
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-seed:
        condition: service_completed_successfully
    stdin_open: true
    tty: false

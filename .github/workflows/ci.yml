name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: |
          pytest tests/ -v --tb=long 2>&1 | tee /tmp/pytest_${{ matrix.python-version }}.log
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Display test output on failure
        if: always()
        run: |
          echo "## Test output (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/pytest_${{ matrix.python-version }}.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check test result
        run: |
          if grep -q "failed" /tmp/pytest_${{ matrix.python-version }}.log; then
            echo "Tests failed"
            exit 1
          fi
          echo "All tests passed"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t thoth-mcp:ci .

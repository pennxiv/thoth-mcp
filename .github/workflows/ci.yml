name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: |
          set +e
          pytest tests/ -v --tb=long 2>&1 | tee /tmp/pytest.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Test failures detected (Python ${{ matrix.python-version }}):"
            grep -E "FAILED|ERRORS|ERROR |Error|assert|raise|SHORT TEST" /tmp/pytest.log | head -30 | while IFS= read -r line; do
              echo "::error::$line"
            done
            echo "=== FULL OUTPUT (last 80 lines) ===" >&2
            tail -80 /tmp/pytest.log >&2
          fi
          exit $EXIT_CODE

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t thoth-mcp:ci .
